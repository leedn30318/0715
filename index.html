<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해양알칼리도 기술 적용 적합성 판별기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-emerald-700 text-white shadow-md py-6 px-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">🌊 해양알칼리도 기술(OAE) 적합성 시각화 시스템</h1>
                <p class="text-emerald-100 text-sm mt-1">연안별 수온, pH, 용존산소량 기반의 탄소 제거 기술 분석 웹앱 (2025 데이터 기준)</p>
            </div>
            <div class="bg-emerald-800 text-emerald-200 px-3 py-1.5 rounded-md text-xs border border-emerald-600">
                GitHub Pages Ready
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent mb-4"></div>
            <p class="text-slate-500 font-medium">해양 데이터 CSV 파일을 불러오는 중입니다...</p>
        </div>

        <div id="dashboard" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                            📍 연안 위치 선택
                        </h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">해역 선택</label>
                                <select id="seaRegion" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                                    </select>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">세부 연안 선택</label>
                                <select id="coastName" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                                    </select>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 pt-4 border-t border-slate-100 text-xs text-slate-400">
                        * CSV 파일의 최신 2025년 표층 데이터를 기준으로 매핑됩니다.
                    </div>
                </div>

                <div id="resultCard" class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between transition-all duration-300">
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-bold text-slate-900">🔬 해양알칼리도 기술 적용 판별 결과</h2>
                            <span id="statusBadge" class="px-3 py-1 rounded-full text-xs font-bold tracking-wide shadow-sm">
                                판별 중
                            </span>
                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 mb-4">
                            <h3 class="text-sm font-bold text-slate-700 mb-2">💡 해당 해역 판별 기준</h3>
                            <p id="criteriaText" class="text-xs text-slate-600 leading-relaxed">-</p>
                        </div>

                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                                <span class="block text-xs text-slate-400 font-medium">현재 수온</span>
                                <span id="valTemp" class="text-xl font-bold text-slate-800 mt-1 block">- ℃</span>
                            </div>
                            <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                                <span class="block text-xs text-slate-400 font-medium">현재 pH</span>
                                <span id="valPH" class="text-xl font-bold text-slate-800 mt-1 block">-</span>
                            </div>
                            <div class="bg-slate-50/50 p-3 rounded-xl border border-slate-100">
                                <span class="block text-xs text-slate-400 font-medium">현재 용존산소량</span>
                                <span id="valDO" class="text-xl font-bold text-slate-800
