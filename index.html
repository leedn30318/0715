<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연안별 해양알칼리도 기술 적용성 분석기</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-color: #1e3a8a;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #334155;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        header h1 {
            margin-bottom: 8px;
            font-size: 2rem;
        }

        /* 컨트롤러 및 대시보드 구조 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* 폼 요소 */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        /* 결과 창 스타일링 */
        .result-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .result-box.pass {
            background-color: #ecfdf5;
            color: var(--success-color);
            border: 2px solid var(--success-color);
        }

        .result-box.fail {
            background-color: #fef2f2;
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
        }

        /* 차트 영역 */
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* 데이터 테이블 영역 */
        .table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌊 연안별 해양알칼리도 기술 적용 적합성 분석</h1>
        <p>CSV 실시간 연동 및 분석 시각화 대시보드</p>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h2>🔍 조건 분석 & 입력</h2>
            
            <div class="form-group">
                <label for="region-select">해역 선택</label>
                <select id="region-select">
                    <option value="동해">동해</option>
                    <option value="남해">남해</option>
                    <option value="서해">서해</option>
                </select>
            </div>

            <div class="form-group">
                <label for="input-temp">수온 (°C)</label>
                <input type="number" id="input-temp" step="0.1" placeholder="예: 18.5">
            </div>

            <div class="form-group">
                <label for="input-ph">수소이온농도 (pH)</label>
                <input type="number" id="input-ph" step="0.01" placeholder="예: 8.12">
            </div>

            <div class="form-group">
                <label for="input-do">용존산소량 (DO, mg/L)</label>
                <input type="number" id="input-do" step="0.1" placeholder="예: 8.3">
            </div>

            <button id="btn-analyze">🔍 적합성 판정하기</button>

            <div id="result-display" class="result-box"></div>
        </div>

        <div class="card">
            <h2>📈 분석 지표 비교 시각화 (기준선 대비)</h2>
            <div class="chart-container">
                <canvas id="oceanChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>tbl_ocean_data : 관측 데이터 로그 (ocean_data.csv)</h2>
        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>해역</th>
                        <th>수온 (°C)</th>
                        <th>수소이온농도 (pH)</th>
                        <th>용존산소량 (mg/L)</th>
                        <th>판정 결과</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ----------------------------------------------------------------
    // 1. CSV 파싱 및 전역 데이터 보관
    // ----------------------------------------------------------------
    let oceanData = [];
    let myChart = null;

    // 실시간 기준 데이터 및 UI 차트 초기화 함수
    window.addEventListener('DOMContentLoaded', () => {
        fetchCSV();
        initChart();
    });

    // CSV 데이터 로드 및 파싱 (Vanilla JS 파서 제작)
    async function fetchCSV() {
        try {
            const response = await fetch('./ocean_data.csv');
            if (!response.ok) {
                throw new Error("CSV 파일을 불러오는 데 실패했습니다. 파일 경로를 확인해 주세요.");
            }
            const dataText = await response.text();
            parseCSV(dataText);
        } catch (error) {
            console.error("Error loading CSV:", error);
            alert("⚠️ ocean_data.csv 로드 실패! 웹 서버 환경(예: Live Server, Github Pages)에서 구동해야 정상 로드됩니다.");
        }
    }

    function parseCSV(text) {
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        if (lines.length < 2) return;

        // CSV 첫 번째 줄 헤더 감지
        const headers = lines[0].split(',').map(h => h.trim());
        
        /* [CSV 열 이름 매핑 설정] 
           실제 사용하실 CSV 헤더에 맞추어 아래 키값을 바꿀 수 있습니다.
        */
        const colRegion = headers[0]; // 해역 (동해/남해/서해)
        const colTemp = headers[1];   // 수온
        const colPH = headers[2];     // pH
        const colDO = headers[3];     // 용존산소량

        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';

        for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',').map(v => v.trim());
            if (values.length < headers.length) continue;

            const rowData = {
                region: values[headers.indexOf(colRegion)],
                temp: parseFloat(values[headers.indexOf(colTemp)]),
                ph: parseFloat(values[headers.indexOf(colPH)]),
                do: parseFloat(values[headers.indexOf(colDO)])
            };

            oceanData.push(rowData);

            // 해당 행의 판정 결과 계산
            const isPass = checkSuitability(rowData.region, rowData.temp, rowData.ph, rowData.do);

            // 테이블에 출력
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${rowData.region}</td>
                <td>${rowData.temp.toFixed(1)} °C</td>
                <td>${rowData.ph.toFixed(2)}</td>
                <td>${rowData.do.toFixed(1)} mg/L</td>
                <td style="color: ${isPass ? 'var(--success-color)' : 'var(--danger-color)'}; font-weight: bold;">
                    ${isPass ? '🟢 사용 가능' : '🔴 부적합'}
                </td>
            `;
            // 테이블의 열을 클릭하면 입력 폼에 해당 값이 자동으로 채워지도록 이벤트 처리
            tr.addEventListener('click', () => {
                document.getElementById('region-select').value = rowData.region;
                document.getElementById('input-temp').value = rowData.temp;
                document.getElementById('input-ph').value = rowData.ph;
                document.getElementById('input-do').value = rowData.do;
                analyzeData();
            });
            tr.style.cursor = 'pointer';
            tableBody.appendChild(tr);
        }

        // CSV의 첫 번째 데이터를 인풋창에 기본으로 채우기
        if(oceanData.length > 0) {
            fillInputFields(oceanData[0]);
        }
    }

    function fillInputFields(data) {
        document.getElementById('region-select').value = data.region;
        document.getElementById('input-temp').value = data.temp;
        document.getElementById('input-ph').value = data.ph;
        document.getElementById('input-do').value = data.do;
        analyzeData();
    }

    // ----------------------------------------------------------------
    // 2. 해양알칼리도 기술 적용 핵심 판정 로직
    // ----------------------------------------------------------------
    function checkSuitability(region, temp, ph, dOxygen) {
        if (region === "동해" || region === "서해") {
            // 수온 17도 이상, 수소이온농도 8.15 미만, 용존산소량 8 이상
            return (temp >= 17 && ph < 8.15 && dOxygen >= 8);
        } else if (region === "남해") {
            // 수온 20도 이상, 수소이온농도 8.15 미만, 용존산소량 8 이상
            return (temp >= 20 && ph < 8.15 && dOxygen >= 8);
        }
        return false;
    }

    // ----------------------------------------------------------------
    // 3. UI 인터랙션 및 결과 분석 실행
    // ----------------------------------------------------------------
    document.getElementById('btn-analyze').addEventListener('click', analyzeData);

    function analyzeData() {
        const region = document.getElementById('region-select').value;
        const temp = parseFloat(document.getElementById('input-temp').value);
        const ph = parseFloat(document.getElementById('input-ph').value);
        const dOxygen = parseFloat(document.getElementById('input-do').value);

        if (isNaN(temp) || !isFinite(temp) || isNaN(ph) || !isFinite(ph) || isNaN(dOxygen) || !isFinite(dOxygen)) {
            alert("올바른 수치를 모두 입력해 주세요.");
            return;
        }

        const isPass = checkSuitability(region, temp, ph, dOxygen);
        const resultDisplay = document.getElementById('result-display');
        
        resultDisplay.style.display = 'block';
        if (isPass) {
            resultDisplay.className = "result-box pass";
            resultDisplay.innerHTML = `✅ ${region} 적용 조건 충족!<br>해양알칼리도 기술 사용 가능`;
        } else {
            resultDisplay.className = "result-box fail";
            resultDisplay.innerHTML = `❌ ${region} 적용 조건 불충족<br>기술 사용 부적합`;
        }

        // 시각화 업데이트
        updateChart(region, temp, ph, dOxygen);
    }

    // ----------------------------------------------------------------
    // 4. Chart.js 데이터 시각화
    // ----------------------------------------------------------------
    function initChart() {
        const ctx = document.getElementById('oceanChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['수온 (°C)', '수소이온농도 (pH * 2)', '용존산소량 (mg/L)'], // 스케일 조정을 위해 pH는 편의상 2를 곱해 차트에 밸런스를 맞춥니다.
                datasets: [
                    {
                        label: '현재 관측값',
                        data: [0, 0, 0],
                        backgroundColor: 'rgba(30, 58, 138, 0.7)',
                        borderColor: 'rgba(30, 58, 138, 1)',
                        borderWidth: 1
                    },
                    {
                        label: '적용 기준선 (최소/최대)',
                        data: [17, 16.3, 8], // 남해와 동·서해에 따라 동적 변경
                        backgroundColor: 'rgba(244, 63, 94, 0.2)',
                        borderColor: 'rgba(244, 63, 94, 1)',
                        borderWidth: 2,
                        type: 'line' // 기준선은 선형태로 표시
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 25
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                let value = context.raw;
                                if (context.dataIndex === 1) {
                                    // pH 환산 역산하여 본래 pH 노출
                                    value = (value / 2).toFixed(2);
                                    return `${label}: pH ${value}`;
                                }
                                return `${label}: ${value}`;
                            }
                        }
                    }
                }
            }
        });
    }

    function updateChart(region, temp, ph, dOxygen) {
        if(!myChart) return;

        // 동/서해는 기준수온 17도, 남해는 20도
        const tempLimit = (region === "남해") ? 20 : 17;
        
        // 차트 스케일 상 pH는 8 내외이므로 기준선 및 표시 편의를 위해 2배곱 처리 (pH 8.15 -> 16.3)
        const phScaled = ph * 2;
        const phLimitScaled = 8.15 * 2; 

        // 차트 데이터 갱신
        myChart.data.datasets[0].data = [temp, phScaled, dOxygen];
        myChart.data.datasets[1].data = [tempLimit, phLimitScaled, 8];
        
        // 데이터셋 범례 이름 실시간 반영
        myChart.data.datasets[1].label = `${region} 적용 기준선 (수온:${tempLimit}↑, pH:8.15↓, DO:8↑)`;

        myChart.update();
    }
</script>
</body>
</html>
